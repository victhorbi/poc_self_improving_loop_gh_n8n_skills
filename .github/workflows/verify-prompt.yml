name: Verify Prompt & Skills

# Runs static formal verification whenever a system prompt or skill file is
# created or updated in a PR.  Six named properties (P1–P6) are checked:
#   P1 NO_CREDENTIALS   — no embedded API keys / tokens  (static regex)
#   P2 NO_SELF_DISCLOSURE — no instructions to reveal the prompt  (static regex)
#   P3 ROLE_CLARITY     — role is unambiguous  (LLM)
#   P4 BEHAVIORAL_BOUNDARIES — explicit constraints are defined  (LLM)
#   P5 INTERNAL_CONSISTENCY  — no contradictions  (LLM)
#   P6 SAFETY_GUARDRAILS — no instructions enabling harm  (LLM)
#
# FAIL on any property → job fails and blocks merge.
# WARN → reported in the PR comment but does not block.
#
# Required secret: OPENROUTER_API_KEY

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "agents/*/system-prompt.md"
      - "agents/*/skills/**/*.md"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: verify-prompt-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.find.outputs.files }}
      count: ${{ steps.find.outputs.count }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4
        with:
          fetch-depth: 0

      - id: find
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '^agents/[^/]+/system-prompt\.md$|^agents/[^/]+/skills/.+\.md$' \
            || true)
          files=$(printf '%s' "$changed" | python3 -c \
            "import sys, json; lines=[l.strip() for l in sys.stdin if l.strip()]; print(json.dumps(lines))")
          count=$(printf '%s' "$files" | python3 -c "import sys, json; print(len(json.load(sys.stdin)))")
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Files to verify: $files"

  verify:
    needs: detect
    if: needs.detect.outputs.count != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4

      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # actions/setup-node v4
        with:
          node-version-file: agent-eval/.nvmrc
          cache: npm
          cache-dependency-path: agent-eval/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: agent-eval

      - name: Run static verification
        working-directory: agent-eval
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OWNER:              ${{ github.repository_owner }}
          REPO:               ${{ github.event.repository.name }}
          PR_NUMBER:          ${{ github.event.pull_request.number }}
          FILES_JSON:         ${{ needs.detect.outputs.files }}
        run: |
          set -euo pipefail
          # Convert JSON array → one path per line, prefixed with ../ (we run from agent-eval/)
          readarray -t FILES < <(
            echo "$FILES_JSON" | python3 -c "
import json, sys
for f in json.loads(sys.stdin.read()):
    print('../' + f)
")
          npm run verify -- "${FILES[@]}"
